# Unit tests only — pure numpy + pytest. Deliberately does NOT run the
# benchmark harness: that requires the ~280 MB LongMemEval-S dataset and
# transformer model downloads (see packet/REPRODUCE.md), which do not
# belong in CI.
name: tests

on:
  push:
  pull_request:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install pytest numpy
      - run: python -m pytest -q
